name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Snakemake and Dependencies
        run: |
          pip install snakemake==7.32.4 pulp==2.7.0
      - name: Lint Snakefile
        run: snakemake --lint
